# Standalone CI compose — does not extend docker-compose.yml.
# felddy/foundryvtt reads FOUNDRY_USERNAME, FOUNDRY_PASSWORD, and
# FOUNDRY_LICENSE_KEY directly from the environment; no config.json needed.
# Run as root (0:0) so the container can write to the GHA-checked-out dist/.
#
# Image pinned to SHA digest for reproducibility (both v13 and v14).
# FOUNDRY_IMAGE_NAME set by CI workflow (with SHA already included).
#
# Three independent foundry servers on ports 30000-30002. Each has its own
# /data volume so worlds, users, and licenses are isolated. Playwright workers
# route to the matching server via `baseURL = http://localhost:3000${workerIndex}`.
# This eliminates the single-server bottleneck that capped CI at 2 workers.
# See issue #546.
#
# FOUNDRY_RELEASE_URL is pre-fetched on the runner (CI workflow) and passed in
# to skip per-container auth. Three parallel auths trip foundryvtt.com rate
# limiting (429). The presigned URL itself doesn't require auth to use.

x-foundry-common: &foundry-common
  image: ${FOUNDRY_IMAGE_NAME}
  user: "0:0"

services:
  foundry-0:
    <<: *foundry-common
    hostname: foundry-0
    ports:
      - "30000:30000"
    environment:
      FOUNDRY_RELEASE_URL: "${FOUNDRY_RELEASE_URL}"
      FOUNDRY_LICENSE_KEY: "${FOUNDRY_LICENSE_KEY}"
      FOUNDRY_HOSTNAME: foundry-0
      CONTAINER_PRESERVE_CONFIG: "true"
    volumes:
      - ./data-0:/data
      - ../foundry/dist:/data/Data/systems/inspectres

  foundry-1:
    <<: *foundry-common
    hostname: foundry-1
    ports:
      - "30001:30000"
    environment:
      FOUNDRY_RELEASE_URL: "${FOUNDRY_RELEASE_URL}"
      FOUNDRY_LICENSE_KEY: "${FOUNDRY_LICENSE_KEY}"
      FOUNDRY_HOSTNAME: foundry-1
      CONTAINER_PRESERVE_CONFIG: "true"
    volumes:
      - ./data-1:/data
      - ../foundry/dist:/data/Data/systems/inspectres

  foundry-2:
    <<: *foundry-common
    hostname: foundry-2
    ports:
      - "30002:30000"
    environment:
      FOUNDRY_RELEASE_URL: "${FOUNDRY_RELEASE_URL}"
      FOUNDRY_LICENSE_KEY: "${FOUNDRY_LICENSE_KEY}"
      FOUNDRY_HOSTNAME: foundry-2
      CONTAINER_PRESERVE_CONFIG: "true"
    volumes:
      - ./data-2:/data
      - ../foundry/dist:/data/Data/systems/inspectres
