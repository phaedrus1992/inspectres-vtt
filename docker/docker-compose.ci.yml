# CI override — no secrets file required.
# felddy/foundryvtt reads FOUNDRY_USERNAME, FOUNDRY_PASSWORD, and
# FOUNDRY_LICENSE_KEY directly from the environment when no config.json is present.
# Run as root (0:0) so the container can write to bind-mounted dist/ checked out by GHA.

services:
  foundry:
    secrets: []
    user: "0:0"
    environment:
      FOUNDRY_USERNAME: "${FOUNDRY_USERNAME}"
      FOUNDRY_PASSWORD: "${FOUNDRY_PASSWORD}"
      FOUNDRY_LICENSE_KEY: "${FOUNDRY_LICENSE_KEY}"
