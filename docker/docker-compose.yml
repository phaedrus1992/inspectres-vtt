secrets:
  config_json:
    file: ./secrets/config.json

services:
  foundry:
    # "release" tracks the latest stable Foundry release. Pin to a specific version
    # (e.g. ghcr.io/felddy/foundryvtt:13.345) if you need reproducible deployments.
    image: ghcr.io/felddy/foundryvtt:release
    hostname: foundry
    ports:
      - "30000:30000"
    secrets:
      - source: config_json
        target: config.json
    environment:
      FOUNDRY_HOSTNAME: foundry
      CONTAINER_PRESERVE_CONFIG: "true"
    volumes:
      - ./data:/data
      - ../foundry/dist:/data/Data/systems/inspectres:ro
