name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: foundry/package-lock.json

      - name: Install dependencies
        working-directory: foundry
        run: npm ci

      - name: Run oxlint
        working-directory: foundry
        run: npm run lint

  spell-check:
    name: Spell check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run typos spell check
        uses: reviewdog/action-typos@d5eb1bbcd1b3bfde596f6eeb470322727862fe98  # v1.19.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: foundry/package-lock.json

      - name: Install dependencies
        working-directory: foundry
        run: npm ci

      - name: Type check
        working-directory: foundry
        run: npm run check

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: foundry/package-lock.json

      - name: Install dependencies
        working-directory: foundry
        run: npm ci

      - name: Build (production)
        working-directory: foundry
        run: npm run prod

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: inspectres-dist
          path: foundry/dist/
          if-no-files-found: error

  check-docs:
    name: Check if docs changed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check docs paths
        id: check
        run: |
          if [ '${{ github.event_name }}' = 'pull_request' ]; then
            # For PRs, always run
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            # For pushes, check if docs or rules changed
            CHANGED=$(git diff --name-only '${{ github.event.before }}' '${{ github.sha }}' | grep -E '^(docs/|\.claude/rules/documentation\.md)' | wc -l)
            if [ "$CHANGED" -gt 0 ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    needs: check-docs
    permissions:
      contents: read
    if: needs.check-docs.outputs.changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build

  e2e:
    name: E2E tests (Foundry ${{ matrix.foundry-version }})
    runs-on: ubuntu-latest
    needs: [build, unit-test, typecheck]
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - foundry-version: v13
            image-sha: sha256:41d518782f2fabbec887413c56da8ef8175c22fb5a75fde45382661443a8ae6b  # felddy/foundryvtt v13
          - foundry-version: v14
            image-sha: sha256:383417dbf3c442a03dcca9a4813b47c7408addaf6d582b7d3b1ee4b65c24a245  # felddy/foundryvtt v14
      fail-fast: false
    env:
      FOUNDRY_USERNAME: ${{ secrets.FOUNDRY_USERNAME }}
      FOUNDRY_PASSWORD: ${{ secrets.FOUNDRY_PASSWORD }}
      FOUNDRY_LICENSE_KEY: ${{ secrets.FOUNDRY_LICENSE_KEY }}
      FOUNDRY_IMAGE_SHA: ${{ matrix.image-sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Download dist artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          name: inspectres-dist
          path: foundry/dist/

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: foundry/package-lock.json

      - name: Install dependencies
        working-directory: foundry
        run: npm ci

      - name: Cache apt packages (Playwright fonts + X deps)
        id: apt-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: /var/cache/apt/archives
          key: apt-playwright-chromium-${{ runner.os }}-v1

      - name: Install apt dependencies for Playwright
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            fonts-freefont-ttf \
            fonts-ipafont-gothic \
            fonts-tlwg-loma-otf \
            fonts-unifont \
            fonts-wqy-zenhei \
            xfonts-cyrillic \
            xfonts-encodings \
            xfonts-scalable \
            xfonts-utils

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('foundry/package-lock.json') }}-${{ runner.os }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: foundry
        run: npx playwright install chromium

      - name: Cache Foundry Docker image
        id: foundry-image-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: /tmp/foundry-image.tar
          key: docker-foundry-${{ matrix.foundry-version }}-${{ runner.os }}-v1

      - name: Load Foundry image from cache
        if: steps.foundry-image-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/foundry-image.tar

      - name: Pull Foundry image and save to cache
        if: steps.foundry-image-cache.outputs.cache-hit != 'true'
        run: |
          docker pull ghcr.io/felddy/foundryvtt@${{ matrix.image-sha }}
          docker save ghcr.io/felddy/foundryvtt@${{ matrix.image-sha }} -o /tmp/foundry-image.tar

      - name: Start Foundry container
        working-directory: docker
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Wait for Foundry to be ready
        working-directory: docker
        run: |
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:30000; then
              echo "Foundry is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: Foundry did not start within 60s"
          docker compose -f docker-compose.ci.yml logs --tail=80
          exit 1

      - name: Run E2E tests
        working-directory: foundry
        run: npm run test:e2e

      - name: Stop Foundry container
        if: always()
        working-directory: docker
        run: docker compose -f docker-compose.ci.yml down

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: e2e-results
          path: |
            foundry/playwright-report/
            foundry/test-results/

  unit-test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: foundry/package-lock.json

      - name: Install dependencies
        working-directory: foundry
        run: npm ci

      - name: Run unit tests with coverage
        working-directory: foundry
        run: npm run test -- --coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-lcov
          path: foundry/coverage/lcov.info
          if-no-files-found: error

