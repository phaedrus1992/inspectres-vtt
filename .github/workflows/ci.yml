name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      - name: Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: foundry/node_modules
          key: node-modules-${{ hashFiles('foundry/package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        working-directory: foundry
        run: npm ci

      - name: Type check
        working-directory: foundry
        run: npm run check

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      - name: Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: foundry/node_modules
          key: node-modules-${{ hashFiles('foundry/package-lock.json') }}
          restore-keys: node-modules-

      - name: Install dependencies
        working-directory: foundry
        run: npm ci

      - name: Build (production)
        working-directory: foundry
        run: npm run prod

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: inspectres-dist
          path: foundry/dist/
          if-no-files-found: error

  check-docs:
    name: Check if docs changed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check docs paths
        id: check
        run: |
          if [ '${{ github.event_name }}' = 'pull_request' ]; then
            # For PRs, always run
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            # For pushes, check if docs or rules changed
            CHANGED=$(git diff --name-only '${{ github.event.before }}' '${{ github.sha }}' | grep -E '^(docs/|\.claude/rules/documentation\.md)' | wc -l)
            if [ "$CHANGED" -gt 0 ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    needs: check-docs
    permissions:
      contents: read
    if: needs.check-docs.outputs.changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'

      - name: Cache node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: docs/node_modules
          key: docs-node-modules-${{ hashFiles('docs/package-lock.json') }}
          restore-keys: docs-node-modules-

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build
