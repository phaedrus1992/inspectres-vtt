name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spell-check:
    name: Spell check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run typos spell check
        uses: reviewdog/action-typos@d5eb1bbcd1b3bfde596f6eeb470322727862fe98  # v1.19.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: foundry/package-lock.json

      - name: Install dependencies
        working-directory: foundry
        run: npm ci

      - name: Type check
        working-directory: foundry
        run: npm run check

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: foundry/package-lock.json

      - name: Install dependencies
        working-directory: foundry
        run: npm ci

      - name: Build (production)
        working-directory: foundry
        run: npm run prod

      - name: Upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: inspectres-dist
          path: foundry/dist/
          if-no-files-found: error

  check-docs:
    name: Check if docs changed
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check docs paths
        id: check
        run: |
          if [ '${{ github.event_name }}' = 'pull_request' ]; then
            # For PRs, always run
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            # For pushes, check if docs or rules changed
            CHANGED=$(git diff --name-only '${{ github.event.before }}' '${{ github.sha }}' | grep -E '^(docs/|\.claude/rules/documentation\.md)' | wc -l)
            if [ "$CHANGED" -gt 0 ]; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    needs: check-docs
    permissions:
      contents: read
    if: needs.check-docs.outputs.changed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    env:
      FOUNDRY_USERNAME: ${{ secrets.FOUNDRY_USERNAME }}
      FOUNDRY_PASSWORD: ${{ secrets.FOUNDRY_PASSWORD }}
      FOUNDRY_LICENSE_KEY: ${{ secrets.FOUNDRY_LICENSE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Download dist artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e  # v4.2.1
        with:
          name: inspectres-dist
          path: foundry/dist/

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: foundry/package-lock.json

      - name: Install dependencies
        working-directory: foundry
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('foundry/package-lock.json') }}

      - name: Install Playwright browsers
        working-directory: foundry
        run: |
          if [ '${{ steps.playwright-cache.outputs.cache-hit }}' = 'true' ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Start Foundry container
        working-directory: docker
        run: docker compose -f docker-compose.ci.yml up -d

      - name: Wait for Foundry to be ready
        working-directory: docker
        run: |
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://localhost:30000; then
              echo "Foundry is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: Foundry did not start within 60s"
          docker compose -f docker-compose.ci.yml logs --tail=80
          exit 1

      - name: Run E2E tests
        working-directory: foundry
        run: npm run test:e2e

      - name: Stop Foundry container
        if: always()
        working-directory: docker
        run: docker compose -f docker-compose.ci.yml down

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: e2e-results
          path: |
            foundry/playwright-report/
            foundry/test-results/
