# See https://pre-commit.com for more information
# Root-level pre-commit configuration for InSpectres VTT
# Workspace discovery: prek looks for .pre-commit-config.yaml in all subdirectories
# Install: prek install
# Run manually: prek run --all-files

repos:
  # Spell checker (runs at project root)
  - repo: https://github.com/crate-ci/typos
    rev: v1.23.1
    hooks:
      - id: typos
        name: Spell check (typos)
        args: [--config, .typos.toml]
        stages: [pre-commit, pre-push]
        exclude: |
          (?x)^(
            \.semgrep-results/|
            \.tmp/
          )$
