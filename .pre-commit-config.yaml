# See https://pre-commit.com for more information
# Authoritative pre-commit configuration for InSpectres VTT
# Install: prek install
# Run manually: prek run --all-files

repos:
  # Spell checker
  - repo: https://github.com/crate-ci/typos
    rev: v1.23.1
    hooks:
      - id: typos
        name: Spell check (typos)
        args: [--config, .typos.toml]
        stages: [pre-commit, pre-push]

  # Quality checks (linting, type checking, tests)
  - repo: local
    hooks:
      - id: quality
        name: Code quality (lint, types, tests)
        entry: sh -c 'cd foundry && npm run quality'
        language: system
        files: ^foundry/src/.*\.ts$
        pass_filenames: false
        stages: [pre-push]
        always_run: true
