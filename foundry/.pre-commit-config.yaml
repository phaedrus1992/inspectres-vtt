# Foundry workspace pre-commit configuration
# Run by prek workspace discovery from root
# Individual hooks for better progress visibility

exclude: |
  (?x)^(
    \.semgrep-results/|
    \.tmp/
  )$

repos:
  # Block Math.random() — use Foundry Roll system instead
  # Exception: allowed in test mocks and test files only
  - repo: local
    hooks:
      - id: no-math-random
        name: Forbid Math.random()
        entry: bash -c 'grep -r "Math\.random" src/ --include="*.ts" --exclude="*.test.ts" --exclude-dir="__mocks__" && echo "❌ Found Math.random() in production code" && exit 1 || exit 0'
        language: system
        files: ^src/.*\.ts$
        pass_filenames: false
        stages: [pre-push]

  # Linting
  - repo: local
    hooks:
      - id: oxlint
        name: Lint (oxlint)
        entry: npm run lint
        language: system
        files: ^src/.*\.ts$
        pass_filenames: false
        stages: [pre-push]

  # Type checking
  - repo: local
    hooks:
      - id: typescript
        name: Type check (TypeScript)
        entry: npm run check
        language: system
        files: ^src/.*\.ts$
        pass_filenames: false
        stages: [pre-push]

  # Tests
  - repo: local
    hooks:
      - id: vitest
        name: Tests (vitest)
        entry: npm test
        language: system
        files: ^src/.*\.ts$
        pass_filenames: false
        stages: [pre-push]
